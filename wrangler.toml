name = "hollerandson"
main = "cloudflare/worker.js"
compatibility_date = "2026-06-26"
workers_dev = true
preview_urls = true

# After clearing any existing Pages/DNS hostname conflicts in Cloudflare,
# add these custom-domain routes back and run `npx wrangler deploy`:
#
# [[routes]]
# pattern = "hollerandson.com"
# custom_domain = true
#
# [[routes]]
# pattern = "www.hollerandson.com"
# custom_domain = true

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "hollerandson"
database_id = "ed4bc3b8-c1db-4642-8061-97177475921d"

[[r2_buckets]]
binding = "ART_BUCKET"
bucket_name = "hollerandson-art"

[vars]
EMAIL_FROM = "Holler & Son <appointments@hollerandson.com>"
BUSINESS_EMAIL_DOMAIN = "mail.hollerandson.com"
