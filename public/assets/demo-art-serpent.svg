<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Serpent and peony tattoo flash</title>
  <desc id="desc">Blackwork serpent wrapped around a peony with red ink accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#120d0e"/>
      <stop offset="1" stop-color="#2b1517"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .12"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="700" fill="url(#bg)"/>
  <rect width="900" height="700" filter="url(#grain)"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
