    <path d="M228 452 C186 508 190 574 254 606 C322 640 386 594 380 520 C318 556 270 532 228 452Z" fill="#9e1f36" stroke="#f5e3c6" stroke-width="10"/>
    <path d="M252 472 C272 520 304 552 364 536 M230 532 C276 510 320 500 374 518" stroke="#f2bb64" stroke-width="6"/>
    <path d="M708 338 l46 -34 l-18 56 l52 24 l-58 10 l-10 58 l-24 -52 l-56 18 l34 -46 l-34 -46 l56 18 l24 -52z" fill="#f2bb64" stroke="#f5e3c6" stroke-width="8"/>
